<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataFlow — {{ t.login_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #171717; --border: #2a2a2a;
      --accent: #c8f07a; --text: #e8e8e8; --muted: #666;
      --danger: #f07a7a; --radius: 6px;
      --mono: 'DM Mono', monospace; --serif: 'Fraunces', serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--mono); font-size: 14px;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ---- Hero banner ---- */
    .hero {
      width: 100%;
      min-height: 340px;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-color: #1a0a05;
      background-image:
        url('https://cdn.mos.cms.futurecdn.net/mGmyUwnUaVSHnQCaFRXYh9.jpg'),
        linear-gradient(135deg, #1a0505 0%, #0a0a1a 50%, #1a0a05 100%);
      background-size: cover;
      background-position: center 20%;
      filter: brightness(0.55) saturate(1.2);
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(15,15,15,0.1) 0%,
        rgba(15,15,15,0.0) 30%,
        rgba(15,15,15,0.7) 70%,
        rgba(15,15,15,1.0) 100%);
    }
    .hero-text {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px 40px;
    }
    .hero-title {
      font-family: var(--serif);
      font-size: clamp(36px, 7vw, 72px);
      font-weight: 600;
      letter-spacing: -1px;
      color: #c8f07a;
      text-shadow:
        0 0 40px rgba(200,240,122,0.5),
        0 2px 8px rgba(0,0,0,0.8);
      line-height: 1;
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: 13px;
      color: rgba(200,240,122,0.6);
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    /* ---- Login card area ---- */
    .login-area {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 32px 24px 40px;
    }
    .login-wrap { width: 100%; max-width: 380px; }

    .brand {
      font-family: var(--serif); font-size: 28px; font-weight: 300;
      color: var(--accent); margin-bottom: 4px; text-align: center;
    }
    .brand em { font-style: italic; }
    .tagline { color: var(--muted); font-size: 12px; text-align: center; margin-bottom: 8px; }
    .lang-row { text-align: center; margin-bottom: 24px; }
    .lang-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: var(--mono); font-size: 11px;
      padding: 3px 10px; border-radius: 99px; cursor: pointer;
      text-decoration: none; transition: all .15s;
    }
    .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
    }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: .08em; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: var(--radius);
      font-family: var(--mono); font-size: 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 12px; border-radius: var(--radius);
      background: var(--accent); color: #0f0f0f; border: none;
      font-family: var(--mono); font-size: 14px; cursor: pointer; transition: background .15s;
    }
    .btn:hover { background: #b5e060; }
    .alert { padding: 10px 14px; border-radius: var(--radius); margin-bottom: 18px; font-size: 13px; }
    .alert-error { background: #2e0f0f; border: 1px solid #5c1a1a; color: var(--danger); }
  </style>
</head>
<body>

<!-- Hero banner -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <div class="hero-title">Zemsta Emira</div>
    <div class="hero-sub">DataFlow · Clan Management <span style="opacity:.7; font-size:12px; letter-spacing:.06em;">v1.5</span></div>
  </div>
</div>

<!-- Login form -->
<div class="login-area">
<div class="login-wrap">
  <div class="brand">Data<em>Flow</em></div>
  <div class="tagline">{{ t.login_tagline }}</div>
  <div style="text-align:center; font-size:12px; color:var(--muted); opacity:.8; margin-top:6px; margin-bottom:6px; letter-spacing:.1em;">v1.5</div>
  <div class="lang-row">
    <a href="{{ url_for('set_lang', lang=t.lang_code) }}" class="lang-btn">{{ t.lang_switch }}</a>
  </div>
  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>{{ t.login_username }}</label>
        <input type="text" name="username" autofocus autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>{{ t.login_password }}</label>
        <input type="password" name="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn">{{ t.login_submit }}</button>
    </form>
  </div>
</div>
</div>
</body>
</html>
